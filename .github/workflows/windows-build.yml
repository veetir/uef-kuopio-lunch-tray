name: Windows Build

on:
  push:
    tags: ["windows-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build exe
        shell: pwsh
        run: cargo build --manifest-path windows-tray/Cargo.toml --release --target x86_64-pc-windows-msvc

      - name: Derive package metadata
        shell: pwsh
        run: |
          $manifest = Get-Content windows-tray/Cargo.toml -Raw
          if ($manifest -notmatch '(?m)^version\s*=\s*"([^"]+)"') {
            throw "Could not parse version from windows-tray/Cargo.toml"
          }
          $version = $Matches[1]
          if ("${env:GITHUB_REF}" -like "refs/tags/windows-v*") {
            $tagVersion = "${env:GITHUB_REF_NAME}".Substring("windows-v".Length)
            if ($tagVersion -ne $version) {
              throw "Tag version $tagVersion does not match Cargo.toml version $version"
            }
          }
          "WINDOWS_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WINDOWS_ZIP=compass-lunch-windows-x64-v$version.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item windows-tray/target/x86_64-pc-windows-msvc/release/compass-lunch.exe dist/
          Copy-Item windows-tray/README_windows.md dist/
          Compress-Archive -Path dist/compass-lunch.exe, dist/README_windows.md -DestinationPath "dist/${env:WINDOWS_ZIP}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: compass-lunch-windows-x64
          path: dist/${{ env.WINDOWS_ZIP }}

      - name: Release asset
        if: startsWith(github.ref, 'refs/tags/windows-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.WINDOWS_ZIP }}
